];

let currentTab = 0;
let userAnswers = {};
let graded = {};

function switchTab(idx) {
  currentTab = idx;
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    if (i === idx) {
      btn.classList.add('active');
      btn.style.backgroundColor = '#3182F6';
      btn.style.color = '#fff';
    } else {
      btn.classList.remove('active');
      btn.style.backgroundColor = '#F4F4F5';
      btn.style.color = '#71717A';
    }
  });
  renderQuiz();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function selectAnswer(qIdx, optIdx) {
  const key = `${currentTab}-${qIdx}`;
  if (graded[currentTab]) return;
  userAnswers[key] = optIdx;
  renderQuiz();
}

function gradeQuiz() {
  graded[currentTab] = true;
  renderQuiz();
  document.getElementById('resultArea').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
  const quiz = quizData[currentTab];
  quiz.questions.forEach((_, i) => {
    delete userAnswers[`${currentTab}-${i}`];
  });
  graded[currentTab] = false;
  renderQuiz();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderQuiz() {
  const quiz = quizData[currentTab];
  const isGraded = graded[currentTab];
  let correct = 0;
  let total = quiz.questions.length;
  let answered = 0;

  quiz.questions.forEach((q, i) => {
    const key = `${currentTab}-${i}`;
    if (userAnswers[key] !== undefined) answered++;
    if (isGraded && userAnswers[key] === q.answer) correct++;
  });

  let html = '';

  // Quiz header
  html += `
    <div class="mb-6">
      <div class="flex items-center gap-3 mb-1">
        <h2 class="text-xl font-bold">${quiz.title}</h2>
        <span class="px-3 py-1 bg-orange-50 text-orange-600 rounded-full text-xs font-semibold">마감 ${quiz.due}</span>
      </div>
      <p class="text-sm text-zinc-500">${quiz.subtitle}</p>
    </div>
  `;

  // Questions
  quiz.questions.forEach((q, qIdx) => {
    const key = `${currentTab}-${qIdx}`;
    const selected = userAnswers[key];
    const isCorrect = selected === q.answer;

    let cardBorder = 'border-zinc-100';
    if (isGraded) {
      if (selected === undefined) cardBorder = 'border-zinc-200';
      else if (isCorrect) cardBorder = 'border-emerald-200';
      else cardBorder = 'border-red-200';
    }

    html += `<div class="bg-white rounded-2xl border ${cardBorder} p-6 mb-4 ${isGraded ? '' : 'hover:border-zinc-200'} transition-smooth">`;
    html += `<div class="flex items-start gap-3 mb-4">`;
    html += `<span class="flex-shrink-0 w-7 h-7 rounded-lg ${isGraded ? (selected !== undefined ? (isCorrect ? 'bg-emerald-500' : 'bg-red-500') : 'bg-zinc-300') : 'bg-accent'} text-white text-xs font-bold flex items-center justify-center">${qIdx + 1}</span>`;
    html += `<p class="text-[15px] font-medium leading-relaxed pt-0.5">${q.q.replace(/\n/g, '<br>')}</p>`;
    html += `</div>`;

    html += `<div class="grid gap-2 ml-10">`;
    const labels = ['A', 'B', 'C', 'D'];
    q.options.forEach((opt, optIdx) => {
      let optClass = '';
      let circleClass = '';
      let labelColor = '';

      if (isGraded) {
        if (optIdx === q.answer) {
          optClass = 'bg-emerald-50 border-emerald-200';
          circleClass = 'border-emerald-500 bg-emerald-500';
          labelColor = 'text-emerald-700';
        } else if (optIdx === selected && optIdx !== q.answer) {
          optClass = 'bg-red-50 border-red-200';
          circleClass = 'border-red-500 bg-red-500';
          labelColor = 'text-red-700';
        } else {
          optClass = 'bg-zinc-50 border-zinc-100 opacity-60';
          circleClass = 'border-zinc-300';
          labelColor = 'text-zinc-400';
        }
      } else {
        if (optIdx === selected) {
          optClass = 'bg-accent-light border-accent';
          circleClass = 'border-accent bg-accent';
          labelColor = 'text-accent';
        } else {
          optClass = 'bg-white border-zinc-200 hover:border-zinc-300 hover:bg-zinc-50 cursor-pointer';
          circleClass = 'border-zinc-300';
          labelColor = 'text-zinc-600';
        }
      }

      html += `<div onclick="selectAnswer(${qIdx}, ${optIdx})" class="flex items-center gap-3 px-4 py-3 rounded-xl border ${optClass} transition-smooth">`;
      html += `<div class="w-5 h-5 rounded-full border-2 ${circleClass} flex-shrink-0 flex items-center justify-center">`;
      if ((isGraded && (optIdx === q.answer || optIdx === selected)) || (!isGraded && optIdx === selected)) {
        html += `<div class="w-2 h-2 rounded-full bg-white"></div>`;
      }
      html += `</div>`;
      html += `<span class="text-xs font-bold ${labelColor} flex-shrink-0">${labels[optIdx]}</span>`;
      html += `<span class="text-sm ${isGraded && optIdx !== q.answer && optIdx !== selected ? 'text-zinc-400' : 'text-zinc-700'}">${opt}</span>`;
      html += `</div>`;
    });
    html += `</div>`;

    // Explanation after grading
    if (isGraded) {
      html += `<div class="mt-4 ml-10 p-4 bg-blue-50 rounded-xl border border-blue-100">`;
      html += `<div class="flex items-start gap-2">`;
      html += `<iconify-icon icon="solar:lightbulb-bold" class="text-accent text-lg mt-0.5 flex-shrink-0"></iconify-icon>`;
      html += `<p class="text-sm text-zinc-600 leading-relaxed">${q.explanation.replace(/\n/g, '<br>')}</p>`;
      html += `</div></div>`;
    }

    html += `</div>`;
  });

  // Result / Actions
  html += `<div id="resultArea">`;
  if (isGraded) {
    const score = Math.round((correct / total) * 100);
    const passed = score >= 60;
    html += `
      <div class="bg-white rounded-2xl border ${passed ? 'border-emerald-200' : 'border-red-200'} p-8 mb-4 text-center">
        <div class="w-16 h-16 mx-auto mb-4 rounded-full ${passed ? 'bg-emerald-100' : 'bg-red-100'} flex items-center justify-center">
          <iconify-icon icon="${passed ? 'solar:check-circle-bold' : 'solar:close-circle-bold'}" class="text-3xl ${passed ? 'text-emerald-500' : 'text-red-500'}"></iconify-icon>
        </div>
        <div class="text-4xl font-extrabold mb-1 ${passed ? 'text-emerald-600' : 'text-red-600'}">${score}점</div>
        <div class="text-sm text-zinc-500 mb-1">${total}문제 중 ${correct}문제 정답</div>
        <div class="inline-flex items-center gap-1.5 px-4 py-1.5 rounded-full text-sm font-semibold mt-2 ${passed ? 'bg-emerald-50 text-emerald-600' : 'bg-red-50 text-red-600'}">
          <iconify-icon icon="${passed ? 'solar:verified-check-bold' : 'solar:danger-triangle-bold'}" class="text-base"></iconify-icon>
          ${passed ? 'PASS' : 'FAIL (60% 이상 필요)'}
        </div>
      </div>
      <button onclick="resetQuiz()" class="w-full py-4 rounded-2xl border-2 border-dashed border-zinc-300 text-zinc-500 font-semibold text-sm hover:border-accent hover:text-accent transition-smooth flex items-center justify-center gap-2">
        <iconify-icon icon="solar:restart-bold" class="text-lg"></iconify-icon>
        다시 풀기
      </button>
    `;
  } else {
    const allAnswered = answered === total;
    html += `
      <div class="flex items-center justify-between mb-4">
        <span class="text-sm text-zinc-500">${answered} / ${total} 답변 완료</span>
        <div class="flex-1 mx-4 h-2 bg-zinc-100 rounded-full overflow-hidden">
          <div class="h-full bg-accent rounded-full transition-all duration-500" style="width:${(answered/total)*100}%"></div>
        </div>
      </div>
      <button onclick="gradeQuiz()" ${allAnswered ? '' : 'disabled'} class="w-full py-4 rounded-2xl font-semibold text-sm flex items-center justify-center gap-2 transition-smooth ${allAnswered ? 'bg-accent text-white hover:bg-accent-dark' : 'bg-zinc-100 text-zinc-400 cursor-not-allowed'}">
        <iconify-icon icon="solar:check-read-bold" class="text-lg"></iconify-icon>
        채점하기
      </button>
    `;
  }
  html += `</div>`;

  document.getElementById('quizContainer').innerHTML = html;
}

// Initialize
switchTab(0);
</script>

</body>
</html>
